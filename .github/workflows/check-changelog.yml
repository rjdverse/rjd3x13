name: Check changelog

on: [ push, pull_request ]

jobs:
  check-changelog-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: jbangdev/jbang-action@v0.136.0
        with:
          script: com.github.nbbrd.heylogs:heylogs-cli:0.15.0:bin
          scriptargs: "check NEWS.md"
